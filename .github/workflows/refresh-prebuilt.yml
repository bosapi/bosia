name: Refresh prebuilt templates

# Keeps the version-locked prebuilt template artifacts (GitHub Release assets)
# in sync with registry/template changes that DON'T bump the version. The
# registry is "live" (served from main via raw.githubusercontent.com), so a
# registry edit must also refresh the baked artifact or `bosia create`'s fast
# path drifts from the `add`/`feat`/fallback paths.
#
# This workflow NEVER publishes to npm and NEVER creates a release — it only
# rebuilds and re-uploads (--clobber) onto the already-existing release for the
# current package.json version. No new tag = no "version already exists" error.

on:
  push:
    branches: [main]
    paths:
      - "registry/**"
      - "packages/bosia/templates/**"
  workflow_dispatch:

# Serialize with publish.yml so a push that both bumps the version AND edits the
# registry never uploads release assets concurrently. cancel-in-progress: false
# = queue, never cancel (so a publish in progress is never killed).
concurrency:
  group: prebuilt-release
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Rebuild + re-upload prebuilt artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(jq -r '.version' package.json)"

          # The release is created by publish.yml on version bump. If the current
          # version hasn't been published yet, there's nothing to clobber — the
          # next publish will generate fresh assets, so skip.
          if ! gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION not published yet — nothing to refresh."
            exit 0
          fi

          bun run build:templates
          gh release upload "$VERSION" dist/prebuilt/*.tar.gz --clobber
        working-directory: packages/bosia
